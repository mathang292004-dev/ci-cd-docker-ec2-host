<!DOCTYPE html>
<html>
<head>
    <title>Netflix Clone + Movie Booking</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- INTERNAL CSS -->
    <style>

        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
        }

        /* HEADER */
        .showcase {
            padding: 20px;
            text-align: center;
            background: #141414;
        }

        .btn {
            background: red;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            margin: 5px;
            display: inline-block;
            border-radius: 5px;
        }

        /* MOVIE GRID */
        .movie-section {
            text-align: center;
            padding: 30px;
        }

        .movie-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .movie-card {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            width: 200px;
        }

        .movie-card img {
            width: 100%;
            border-radius: 10px;
        }

        .movie-card button {
            margin-top: 10px;
            padding: 8px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        /* BOOKING FORM */
        .booking-form {
            text-align: center;
            padding: 30px;
            background: #111;
        }

        .booking-form form {
            display: flex;
            flex-direction: column;
            width: 300px;
            margin: auto;
            gap: 10px;
        }

        .booking-form input,
        .booking-form select {
            padding: 10px;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 20px;
            background: #000;
            color: gray;
        }

    </style>
</head>

<body>

<!-- HEADER -->
<div class="showcase">
    <h1>🎬 Netflix Clone + Movie Booking</h1>

    <a href="#home" class="btn">Home</a>
    <a href="#movies" class="btn">Movies</a>
    <a href="#booking" class="btn">Book Tickets</a>
</div>

<!-- HOME -->
<section id="home" class="movie-section">
    <h2>Unlimited Movies & Shows</h2>
    <p>Watch anywhere. Book your favorite movie below.</p>
</section>

<!-- MOVIES -->
<section id="movies" class="movie-section">

    <h2>Now Showing</h2>

    <div class="movie-grid">

        <div class="movie-card">
            <img src="https://m.media-amazon.com/images/I/81p+xe8cbnL.jpg">
            <h3>Avengers Endgame</h3>
            <button>Book Now</button>
        </div>

        <div class="movie-card">
            <img src="https://m.media-amazon.com/images/I/71Ni7UNU4kL.jpg">
            <h3>Inception</h3>
            <button>Book Now</button>
        </div>

        <div class="movie-card">
            <img src="https://m.media-amazon.com/images/I/51EG732BV3L.jpg">
            <h3>Interstellar</h3>
            <button>Book Now</button>
        </div>

    </div>

</section>

<!-- BOOKING -->
<section id="booking" class="booking-form">

    <h2>🎟️ Book Your Ticket</h2>

    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Email" required>

        <select>
            <option>Select Movie</option>
            <option>Avengers Endgame</option>
            <option>Inception</option>
            <option>Interstellar</option>
        </select>

        <input type="date">

        <button type="submit" class="btn">Confirm Booking</button>
    </form>

</section>

<!-- FOOTER -->
<footer>
    © 2026 Netflix Clone Movie Booking Project
</footer>

</body>
</html>
