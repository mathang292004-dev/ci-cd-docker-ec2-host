name: CI-CD Docker to ECR and EC2 (US-EAST-1)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: web-app-repo
  IMAGE_TAG: latest

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPOSITORY .

      - name: Tag Image
        run: |
          docker tag $ECR_REPOSITORY:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push Image to ECR
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG


  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "=============================="
            echo "🔍 SYSTEM CHECK"
            echo "=============================="

            # --------------------------
            # INSTALL DOCKER (if missing)
            # --------------------------
            if ! command -v docker &> /dev/null
            then
              echo "Installing Docker..."
              sudo apt update -y
              sudo apt install docker.io -y
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            else
              echo "Docker already installed"
            fi

            # --------------------------
            # INSTALL AWS CLI v2 (FIXED)
            # --------------------------
            if ! command -v aws &> /dev/null
            then
              echo "Installing AWS CLI v2..."

              sudo apt update -y
              sudo apt install curl unzip -y

              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              unzip awscliv2.zip
              sudo ./aws/install

              echo "AWS CLI installed successfully"
            else
              echo "AWS CLI already installed"
            fi

            echo "=============================="
            echo "🔐 LOGIN TO ECR"
            echo "=============================="

            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

            echo "=============================="
            echo "📥 PULL IMAGE"
            echo "=============================="

            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/web-app-repo:latest

            echo "=============================="
            echo "🛑 STOP OLD CONTAINER"
            echo "=============================="

            docker stop webapp || true
            docker rm webapp || true

            echo "=============================="
            echo "🚀 RUN NEW CONTAINER"
            echo "=============================="

            docker run -d -p 80:80 --name webapp --restart always \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/web-app-repo:latest

            echo "=============================="
            echo "✅ DEPLOYMENT SUCCESS"
            echo "=============================="