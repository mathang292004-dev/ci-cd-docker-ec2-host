name: CI-CD Docker to ECR and EC2 (US-EAST-1)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: web-app-repo
  IMAGE_TAG: latest

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          set -e
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build Docker Image
        run: |
          set -e
          docker build -t $ECR_REPOSITORY .

      - name: Tag Docker Image
        run: |
          set -e
          docker tag $ECR_REPOSITORY:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push Docker Image to ECR
        run: |
          set -e
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Verify Image Exists in ECR
        run: |
          aws ecr describe-images --repository-name $ECR_REPOSITORY --region $AWS_REGION


  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            set -e  # 🚨 IMPORTANT: FAIL FAST

            echo "=============================="
            echo "🚀 START DEPLOYMENT"
            echo "=============================="

            # Install Docker if missing
            if ! command -v docker &> /dev/null
            then
              echo "Installing Docker..."
              sudo apt update -y
              sudo apt install docker.io -y
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            echo "=============================="
            echo "🔐 CHECK IAM ROLE ACCESS"
            echo "=============================="

            aws sts get-caller-identity

            echo "=============================="
            echo "🔑 LOGIN TO ECR (NO AWS CONFIG NEEDED)"
            echo "=============================="

            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

            echo "=============================="
            echo "📥 PULL IMAGE"
            echo "=============================="

            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/web-app-repo:latest

            echo "=============================="
            echo "📦 LIST IMAGES (DEBUG)"
            echo "=============================="

            docker images

            echo "=============================="
            echo "🛑 STOP OLD CONTAINER"
            echo "=============================="

            docker stop webapp || true
            docker rm webapp || true

            echo "=============================="
            echo "🚀 RUN CONTAINER"
            echo "=============================="

            docker run -d -p 80:80 --name webapp --restart always \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/web-app-repo:latest

            echo "=============================="
            echo "📦 FINAL STATUS"
            echo "=============================="

            docker ps